name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate tools
        run: npm run validate-tools

      - name: Build
        run: npm run build

      - name: Verify dist exists
        run: test -f dist/index.js

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for hardcoded secrets
        run: |
          if grep -rn --include="*.ts" -E "(api[_-]?key|secret|token|password)\s*[:=]\s*['\"][A-Za-z0-9]{16,}" src/ | grep -v __tests__/ | grep -v ".example"; then
            echo "::error::Possible hardcoded secrets found"
            exit 1
          fi

      - name: Check for console.log in production code
        run: |
          if grep -rn --include="*.ts" -E "console\.(log|debug)" src/ | grep -v __tests__/ | grep -v "scripts/"; then
            echo "::error::console.log/debug found in production code (use console.error for MCP stderr logging)"
            exit 1
          fi

      - name: Check for raw fetch calls
        run: |
          if grep -rn --include="*.ts" "\bfetch(" src/modules/ | grep -v __tests__/ | grep -v "shared/http"; then
            echo "::error::Raw fetch() found — use shared/http.ts instead"
            exit 1
          fi
